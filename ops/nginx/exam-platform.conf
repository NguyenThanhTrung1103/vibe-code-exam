# Phase 11 — Nginx vhost TEMPLATE for exam.example.com.
#
# *** NOT INSTALLED IN PHASE 11 ***
# This file is shipped under ops/nginx/ for review. Phase 12's readiness
# checklist gates installation:
#   1. Real DNS for exam.example.com points to the LXC.
#   2. Founder approves public exposure.
#   3. /readyz returns 200 in prod env.
#   4. Backup automation (Phase 10 Gate B) is firing.
#   5. Blog vhost regression tested with `nginx -t`.
#
# Until then the app runs on 127.0.0.1:8001 via systemd (loopback only).
#
# To install (Phase 12 step):
#   cp ops/nginx/exam-platform.conf /etc/nginx/sites-available/
#   ln -sf /etc/nginx/sites-available/exam-platform.conf /etc/nginx/sites-enabled/
#   nginx -t   # MUST PASS — confirms blog vhost untouched
#   systemctl reload nginx
#   certbot --nginx -d exam.example.com   # LE, http-01 challenge

server {
    listen 80;
    server_name exam.example.com;
    # Certbot will inject the http-01 challenge location during issuance.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name exam.example.com;

    # Certbot writes these on first --nginx issuance.
    # ssl_certificate     /etc/letsencrypt/live/exam.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/exam.example.com/privkey.pem;

    client_max_body_size 30M;

    # Static — Phase 09 CSP keeps this same-origin only.
    location /static/ {
        alias /srv/exam-platform/app/static/;
        access_log off;
        expires 7d;
    }

    # App (loopback). When this vhost is enabled, change the systemd
    # unit's --host/--port to a unix socket and update proxy_pass.
    location / {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 60s;
        proxy_request_buffering on;
    }

    # Defense-in-depth header floor — Phase 09 sets these from FastAPI as
    # well. Keeping them here means an Nginx-only response (e.g. 502)
    # still ships them.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
