services:
  db:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-exam_platform_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-exam_platform_pw}
      POSTGRES_DB: ${POSTGRES_DB:-exam_platform_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - exam-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ENV: ${ENV:-local}
      DEBUG: ${DEBUG:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-exam_platform_user}:${POSTGRES_PASSWORD:-exam_platform_pw}@db:5432/${POSTGRES_DB:-exam_platform_db}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-before-prod}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-exam_session}
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "${APP_PORT:-8000}:8000"

volumes:
  exam-pgdata:
