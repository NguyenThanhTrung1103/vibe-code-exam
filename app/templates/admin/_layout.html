{% extends "base.html" %}
{% block extra_head %}
  <link rel="stylesheet" href="{{ url_for('static', path='css/admin.css') }}" />
  <style>[x-cloak]{display:none !important;}</style>
{% endblock %}
{% block body_class %}has-admin-shell{% endblock %}
{% block main_class %}admin-shell{% endblock %}
{% block content %}
  <p class="admin-eyebrow">Admin</p>
  {% if csrf_token is defined %}
  <input type="hidden" name="csrf_token" id="page-csrf" value="{{ csrf_token }}" />
  {% endif %}
  {% block admin_content %}{% endblock %}
{% endblock %}
