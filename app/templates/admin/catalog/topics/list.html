{% extends "base.html" %}
{% block title %}Admin · Topics{% endblock %}
{% block content %}
<h1>Topics</h1>

<input type="hidden" name="csrf_token" id="page-csrf" value="{{ csrf_token }}">

<section class="catalog-create">
  <h2>Add topic</h2>
  <form hx-post="/admin/topics"
        hx-target="#topic-rows"
        hx-swap="beforeend"
        hx-on::after-request="if(event.detail.successful) this.reset()">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label>Exam
      <select name="exam_id" required>
        {% for e in exams %}<option value="{{ e.id }}">{{ e.name }}</option>{% endfor %}
      </select>
    </label>
    <label>Name <input name="name" required maxlength="255"></label>
    <label>Slug <input name="slug" maxlength="128" placeholder="auto from name"></label>
    <label>Weight <input name="weight" type="number" step="0.01" min="0" max="100"></label>
    <label>Description <textarea name="description" maxlength="4000"></textarea></label>
    <button class="btn" type="submit">Create</button>
  </form>
</section>

<table class="catalog-table">
  <thead>
    <tr><th>Provider</th><th>Course</th><th>Exam</th><th>Topic</th><th>Slug</th><th>Weight</th><th>Actions</th></tr>
  </thead>
  <tbody id="topic-rows">
  {% for row in rows %}
    {% include "admin/catalog/topics/_row.html" %}
  {% endfor %}
  </tbody>
</table>
{% endblock %}
