<tr id="provider-{{ row.id }}">
  <td>
    {% if row.logo_url %}
      <img src="{{ row.logo_url }}" alt="" style="width:28px;height:28px;object-fit:contain;vertical-align:middle;margin-right:8px;border-radius:4px;background:#f5f7fb;padding:2px;" onerror="this.style.display='none'" />
    {% endif %}
    <strong>{{ row.name }}</strong>
  </td>
  <td><code>{{ row.slug }}</code></td>
  <td>{{ (row.description or "")[:80] }}</td>
  <td>
    <button class="btn"
            type="button"
            hx-get="/admin/providers/{{ row.id }}/edit"
            hx-target="#provider-{{ row.id }}"
            hx-swap="outerHTML">
      Edit
    </button>
    <a class="btn" href="/vendors/{{ row.slug }}" target="_blank" rel="noopener">View public</a>
    <button class="btn btn-danger"
            type="button"
            hx-post="/admin/providers/{{ row.id }}/delete"
            hx-include="#page-csrf"
            hx-target="#provider-{{ row.id }}"
            hx-swap="outerHTML"
            hx-confirm="Delete provider {{ row.name }}? Only allowed if it has no courses.">
      Delete
    </button>
  </td>
</tr>
