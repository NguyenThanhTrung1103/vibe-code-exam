{% extends "auth/_layout.html" %}
{% block title %}Sign in — Exam Platform{% endblock %}
{% block auth_title %}Sign in{% endblock %}
{% block auth_form %}
  <form method="post" action="/auth/login" hx-post="/auth/login" hx-target="#auth-result" hx-swap="innerHTML">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
    <label>
      Email or username
      <input type="text" name="identifier" autocomplete="username" required />
    </label>
    <label>
      Password
      <input type="password" name="password" autocomplete="current-password" required />
    </label>
    <button type="submit" class="btn">Sign in</button>
  </form>
  <div id="auth-result" aria-live="polite"></div>
  <p><a href="/auth/register">Create an account</a></p>
{% endblock %}
