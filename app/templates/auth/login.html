{% extends "auth/_layout.html" %}
{% block title %}Admin Login — Exam Platform{% endblock %}
{% block auth_title %}Admin Login{% endblock %}
{% block auth_subtitle %}
  <p class="auth-subtitle">Sign in to manage imports and question data.</p>
{% endblock %}
{% block auth_form %}
  <form method="post" action="/auth/login">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
    <input type="hidden" name="next" value="{{ next or '' }}" />
    <div class="field">
      <label class="field-label" for="login-identifier">Email or username</label>
      <input id="login-identifier" type="text" name="identifier" autocomplete="username" required />
    </div>
    <div class="field">
      <label class="field-label" for="login-password">Password</label>
      <input id="login-password" type="password" name="password" autocomplete="current-password" required />
    </div>
    <button type="submit" class="btn-primary">Sign in</button>
  </form>
  <p class="auth-foot"><a href="/auth/register">Create an account</a></p>
{% endblock %}
